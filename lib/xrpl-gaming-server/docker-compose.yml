services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xrpl
      POSTGRES_PASSWORD: xrpl
      POSTGRES_DB: xrpl_gaming
    ports:
      - "5432:5432"
    volumes:
      - xrpl_gaming_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xrpl -d xrpl_gaming"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Run `pnpm --filter @workspace/xrpl-gaming-server run build` on the host
    # first. The CLI is fully bundled by esbuild (pino transports included),
    # so no node_modules mount is required — just the dist/ output.
    volumes:
      - ./dist:/app/dist:ro
    command: ["node", "--enable-source-maps", "/app/dist/cli.js"]
    environment:
      PORT: "3000"
      NODE_ENV: production
      SERVER_API_KEY: ${SERVER_API_KEY}
      XRPL_NODE_URL: ${XRPL_NODE_URL:-wss://s.altnet.rippletest.net:51233}
      XRPL_ISSUER_SEED: ${XRPL_ISSUER_SEED}
      PINATA_JWT: ${PINATA_JWT}
      DATABASE_URL: postgres://xrpl:xrpl@postgres:5432/xrpl_gaming
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  xrpl_gaming_pg:
