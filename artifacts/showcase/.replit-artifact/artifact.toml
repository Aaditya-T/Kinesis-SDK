kind = "web"
previewPath = "/"
title = "XRPL DynamicNFT Gaming SDK"
version = "1.0.0"
id = "artifacts/showcase"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20059

[services.development]
run = "pnpm --filter @workspace/showcase run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/showcase", "run", "build" ]
publicDir = "artifacts/showcase/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20059"
BASE_PATH = "/"
